      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;

    .btn:hover { background: #1ebe5d; }
    .hint {
      font-size: 12px;
      color: #aaa;
      margin-top: 1.25rem;

      background: #25D366;
